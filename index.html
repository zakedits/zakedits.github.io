<!doctype html>
<html lang="en" data-lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zakaria Okdeh — Portfolio</title>

  <!-- Bootstrap (responsive, modern) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your small custom styles -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="index.html">Portfolio</a>

    <div class="d-flex gap-2 align-items-center">
      <select id="langSelect" class="form-select form-select-sm" style="width:auto">
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="ar">AR</option>
      </select>
    </div>
  </div>
</nav>

<header class="py-5">
  <div class="container">
    <h1 class="display-6 fw-bold" id="heroTitle">Hi, I’m Zakaria.</h1>
    <p class="lead mb-0" id="heroSubtitle">Electromechanical Engineering Student — Projects, internships, and prototypes.</p>
  </div>
</header>

<main class="pb-5">
  <div class="container">
    <div class="d-flex justify-content-between align-items-end mb-3">
      <h2 class="h4 mb-0" id="projectsTitle">Projects</h2>
      <span class="text-secondary small" id="projectsHint">Click any project to see details.</span>
    </div>

    <div class="row g-3" id="projectsGrid"></div>
  </div>
</main>

<footer class="border-top py-4">
  <div class="container small text-secondary d-flex justify-content-between flex-wrap gap-2">
    <span id="footerLeft">© <span id="year"></span> Zakaria Okdeh</span>
    <span>
      <a class="link-secondary me-3" href="#" id="contactEmail">Email</a>
      <a class="link-secondary me-3" href="#" id="contactLinkedIn">LinkedIn</a>
      <a class="link-secondary" href="#" id="contactGitHub">GitHub</a>
    </span>
  </div>
</footer>

<script>
  // ========= Helpers =========
  const qs = (k) => new URLSearchParams(location.search).get(k);
  const setAttr = (el, name, val) => el && el.setAttribute(name, val);

  const state = {
    lang: qs("lang") || localStorage.getItem("lang") || "en",
    i18n: null,
    projects: null
  };

  function applyDirAndLang(lang){
    const html = document.documentElement;
    html.lang = lang === "ar" ? "ar" : (lang === "fr" ? "fr" : "en");
    html.dataset.lang = lang;
    html.dir = (lang === "ar") ? "rtl" : "ltr";
  }

  function t(path){
    // path like "nav.projects"
    const parts = path.split(".");
    let cur = state.i18n?.[state.lang];
    for (const p of parts) cur = cur?.[p];
    return cur ?? path;
  }

  async function loadData(){
    const [i18nRes, projRes] = await Promise.all([
      fetch("data/i18n.json"),
      fetch("data/projects.json")
    ]);
    state.i18n = await i18nRes.json();
    state.projects = await projRes.json();
  }

  function renderStaticText(){
    document.getElementById("heroTitle").textContent = t("home.heroTitle");
    document.getElementById("heroSubtitle").textContent = t("home.heroSubtitle");
    document.getElementById("projectsTitle").textContent = t("home.projectsTitle");
    document.getElementById("projectsHint").textContent = t("home.projectsHint");
    document.getElementById("footerLeft").firstChild.textContent = t("footer.copyrightPrefix") + " ";
    document.getElementById("contactEmail").textContent = t("footer.email");
    document.getElementById("contactLinkedIn").textContent = t("footer.linkedin");
    document.getElementById("contactGitHub").textContent = t("footer.github");
    document.getElementById("year").textContent = new Date().getFullYear();

    // Put your real links here:
    document.getElementById("contactEmail").href = "mailto:your.email@example.com";
    document.getElementById("contactLinkedIn").href = "https://www.linkedin.com/in/YOURPROFILE";
    document.getElementById("contactGitHub").href = "https://github.com/YOURUSERNAME";
  }

  function renderProjects(){
    const grid = document.getElementById("projectsGrid");
    grid.innerHTML = "";

    state.projects.forEach(p => {
      const title = p.title[state.lang] || p.title.en;
      const summary = p.summary[state.lang] || p.summary.en;

      const col = document.createElement("div");
      col.className = "col-12 col-md-6 col-lg-4";

      col.innerHTML = `
        <a class="card h-100 shadow-sm card-link" href="project.html?id=${encodeURIComponent(p.id)}&lang=${encodeURIComponent(state.lang)}">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start gap-2">
              <h3 class="h6 fw-bold mb-2">${title}</h3>
              <span class="badge text-bg-light">${p.year}</span>
            </div>
            <p class="text-secondary mb-3">${summary}</p>
            <div class="small text-secondary">${(p.tags || []).join(" · ")}</div>
          </div>
        </a>
      `;
      grid.appendChild(col);
    });
  }

  async function init(){
    applyDirAndLang(state.lang);
    document.getElementById("langSelect").value = state.lang;

    await loadData();
    renderStaticText();
    renderProjects();

    document.getElementById("langSelect").addEventListener("change", (e) => {
      state.lang = e.target.value;
      localStorage.setItem("lang", state.lang);
      applyDirAndLang(state.lang);
      renderStaticText();
      renderProjects();
    });
  }

  init();
</script>
</body>
</html>
