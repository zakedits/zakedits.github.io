<!doctype html>
<html lang="en" data-lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project — Zakaria Okdeh</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<nav class="nav" id="mainNav">
  <div class="nav__inner">
    <a class="nav__logo" href="index.html" id="backHome">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span id="backText">Back</span>
    </a>
    <div class="nav__right">
      <select id="langSelect" class="nav__lang">
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="ar">AR</option>
      </select>
    </div>
  </div>
</nav>

<main class="project-detail">
  <div class="container">

    <!-- Hero area -->
    <div class="project-detail__hero">
      <div class="project-detail__meta">
        <span class="project-detail__year" id="projectYear"></span>
        <span class="project-detail__cat" id="projectCat"></span>
      </div>
      <h1 class="project-detail__title" id="title">Project Title</h1>
      <p class="project-detail__summary" id="summary"></p>
      <div class="project-detail__tags" id="tagsContainer"></div>
    </div>

    <!-- Video embed placeholder -->
    <div class="project-detail__video" id="videoContainer">
      <div class="project-detail__video-placeholder">
        <i class="fa-solid fa-play"></i>
        <span id="videoPlaceholderText">Video coming soon</span>
      </div>
    </div>

    <!-- Content -->
    <div class="project-detail__content">
      <div class="project-detail__main">
        <section class="detail-section">
          <h2 class="detail-section__title" id="secOverview">Overview</h2>
          <p class="detail-section__text" id="overview"></p>
        </section>

        <section class="detail-section">
          <h2 class="detail-section__title" id="secWhatIDid">What I Did</h2>
          <ul class="detail-section__list" id="whatIDid"></ul>
        </section>

        <section class="detail-section">
          <h2 class="detail-section__title" id="secResults">Results</h2>
          <ul class="detail-section__list" id="results"></ul>
        </section>
      </div>

      <aside class="project-detail__sidebar">
        <div class="sidebar-card">
          <h3 class="sidebar-card__title" id="secTools">Tools Used</h3>
          <div class="sidebar-card__tags" id="tools"></div>
        </div>

        <div class="sidebar-card">
          <h3 class="sidebar-card__title" id="secLinks">Links</h3>
          <div class="sidebar-card__links">
            <a class="btn btn--primary btn--sm btn--full" id="linkDemo" target="_blank" rel="noopener">
              <i class="fa-solid fa-play"></i>
              <span id="linkDemoText">Watch Video</span>
            </a>
            <a class="btn btn--ghost btn--sm btn--full" id="linkCode" target="_blank" rel="noopener">
              <i class="fa-solid fa-arrow-up-right-from-square"></i>
              <span id="linkCodeText">Project Files</span>
            </a>
          </div>
        </div>
      </aside>
    </div>

  </div>
</main>

<footer class="footer">
  <div class="container footer__inner">
    <span>© <span id="year"></span> Zakaria Okdeh</span>
    <a href="index.html" class="footer__back" id="footerBack">← All Projects</a>
  </div>
</footer>

<script>
  const qs = (k) => new URLSearchParams(location.search).get(k);
  const state = {
    lang: qs("lang") || localStorage.getItem("lang") || "en",
    id: qs("id"),
    i18n: null,
    projects: null,
    project: null
  };

  function applyDirAndLang(lang) {
    const html = document.documentElement;
    html.lang = lang;
    html.dataset.lang = lang;
    html.dir = (lang === "ar") ? "rtl" : "ltr";
  }

  function t(path) {
    const parts = path.split(".");
    let cur = state.i18n?.[state.lang];
    for (const p of parts) cur = cur?.[p];
    return cur ?? path;
  }

  async function loadData() {
    const [i18nRes, projRes] = await Promise.all([
      fetch("data/i18n.json"),
      fetch("data/projects.json")
    ]);
    state.i18n = await i18nRes.json();
    state.projects = await projRes.json();
  }

  function setText(id, txt) { const el = document.getElementById(id); if (el) el.textContent = txt; }
  function setHref(id, href) { const el = document.getElementById(id); if (el) el.href = href || "#"; }

  function render() {
    if (!state.project) {
      document.getElementById("title").textContent = "Project not found";
      return;
    }

    const p = state.project;
    const lang = state.lang;

    // Nav
    setText("backText", t("project.back"));
    document.getElementById("backHome").href = `index.html?lang=${encodeURIComponent(lang)}`;

    // Hero
    const title = p.title[lang] || p.title.en;
    document.title = title + " — Zakaria Okdeh";
    setText("title", title);
    setText("summary", p.summary[lang] || p.summary.en);
    setText("projectYear", p.year);
    setText("projectCat", p.category?.[lang] || p.category?.en || "");

    // Tags
    const tagsContainer = document.getElementById("tagsContainer");
    tagsContainer.innerHTML = "";
    (p.tags || []).forEach(tag => {
      const span = document.createElement("span");
      span.className = "tag";
      span.textContent = tag;
      tagsContainer.appendChild(span);
    });

    // Video placeholder
    setText("videoPlaceholderText", t("project.videoSoon"));

    // If there's a video embed URL
    if (p.videoEmbed) {
      const vc = document.getElementById("videoContainer");
      vc.innerHTML = `<iframe src="${p.videoEmbed}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:9/16;max-width:400px;margin:0 auto;display:block;border-radius:12px;"></iframe>`;
    }

    // Section titles
    setText("secOverview", t("project.overview"));
    setText("secWhatIDid", t("project.whatIDid"));
    setText("secResults", t("project.results"));
    setText("secTools", t("project.tools"));
    setText("secLinks", t("project.links"));
    setText("linkDemoText", t("project.watchVideo"));
    setText("linkCodeText", t("project.projectFiles"));

    // Content
    setText("overview", p.overview[lang] || p.overview.en || "");

    const what = document.getElementById("whatIDid");
    what.innerHTML = "";
    (p.whatIDid[lang] || p.whatIDid.en || []).forEach(item => {
      const li = document.createElement("li"); li.textContent = item; what.appendChild(li);
    });

    const res = document.getElementById("results");
    res.innerHTML = "";
    (p.results[lang] || p.results.en || []).forEach(item => {
      const li = document.createElement("li"); li.textContent = item; res.appendChild(li);
    });

    // Tools
    const tools = document.getElementById("tools");
    tools.innerHTML = "";
    (p.tools || []).forEach(tool => {
      const span = document.createElement("span");
      span.className = "tag";
      span.textContent = tool;
      tools.appendChild(span);
    });

    // Links
    const demoLink = p.demo || p.demoUrl || "";
    const codeLink = p.code || p.codeUrl || "";
    const demoBtn = document.getElementById("linkDemo");
    const codeBtn = document.getElementById("linkCode");
    if (demoLink) { setHref("linkDemo", demoLink); demoBtn.style.display = ""; }
    else { demoBtn.style.display = "none"; }
    if (codeLink) { setHref("linkCode", codeLink); codeBtn.style.display = ""; }
    else { codeBtn.style.display = "none"; }

    document.getElementById("year").textContent = new Date().getFullYear();
    setText("footerBack", t("project.allProjects"));
    document.getElementById("footerBack").href = `index.html?lang=${encodeURIComponent(lang)}`;
  }

  async function init() {
    applyDirAndLang(state.lang);
    document.getElementById("langSelect").value = state.lang;

    await loadData();
    state.project = state.projects.find(x => x.id === state.id);
    render();

    requestAnimationFrame(() => document.body.classList.add("loaded"));

    document.getElementById("langSelect").addEventListener("change", (e) => {
      state.lang = e.target.value;
      localStorage.setItem("lang", state.lang);
      applyDirAndLang(state.lang);
      const url = new URL(location.href);
      url.searchParams.set("lang", state.lang);
      history.replaceState({}, "", url);
      render();
    });

    window.addEventListener("scroll", () => {
      document.getElementById("mainNav").classList.toggle("nav--scrolled", window.scrollY > 60);
    });
  }

  init();
</script>
</body>
</html>
