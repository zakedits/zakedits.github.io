<!doctype html>
<html lang="en" data-lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project — Portfolio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-semibold" id="backHome" href="index.html">← Home</a>

    <div class="d-flex gap-2 align-items-center">
      <select id="langSelect" class="form-select form-select-sm" style="width:auto">
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="ar">AR</option>
      </select>
    </div>
  </div>
</nav>

<main class="py-4">
  <div class="container">
    <div class="d-flex justify-content-between flex-wrap gap-2 align-items-start">
      <div>
        <h1 class="h3 fw-bold mb-1" id="title">Project Title</h1>
        <div class="text-secondary" id="meta">Year • Tags</div>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary btn-sm" id="btnDemo" target="_blank" rel="noopener">Demo</a>
        <a class="btn btn-outline-secondary btn-sm" id="btnCode" target="_blank" rel="noopener">Code</a>
      </div>
    </div>

    <hr class="my-4">

    <div class="row g-4">
      <div class="col-12 col-lg-8">
        <h2 class="h5" id="secOverview">Overview</h2>
        <p class="text-secondary" id="overview"></p>

        <h2 class="h5 mt-4" id="secWhatIDid">What I did</h2>
        <ul class="text-secondary" id="whatIDid"></ul>

        <h2 class="h5 mt-4" id="secResults">Results</h2>
        <ul class="text-secondary" id="results"></ul>
      </div>

      <div class="col-12 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h3 class="h6 fw-bold" id="secTools">Tools</h3>
            <div class="d-flex flex-wrap gap-2" id="tools"></div>

            <hr>

            <h3 class="h6 fw-bold" id="secLinks">Links</h3>
            <div class="d-grid gap-2">
              <a class="btn btn-outline-primary btn-sm" id="linkDemo" target="_blank" rel="noopener">Open Demo</a>
              <a class="btn btn-outline-primary btn-sm" id="linkCode" target="_blank" rel="noopener">Open Code</a>
            </div>
          </div>
        </div>

        <div class="small text-secondary mt-3" id="note">
          Tip: keep demo videos unlisted and link them here.
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  const qs = (k) => new URLSearchParams(location.search).get(k);
  const state = {
    lang: qs("lang") || localStorage.getItem("lang") || "en",
    id: qs("id"),
    i18n: null,
    projects: null,
    project: null
  };

  function applyDirAndLang(lang){
    const html = document.documentElement;
    html.lang = lang === "ar" ? "ar" : (lang === "fr" ? "fr" : "en");
    html.dataset.lang = lang;
    html.dir = (lang === "ar") ? "rtl" : "ltr";
  }

  function t(path){
    const parts = path.split(".");
    let cur = state.i18n?.[state.lang];
    for (const p of parts) cur = cur?.[p];
    return cur ?? path;
  }

  async function loadData(){
    const [i18nRes, projRes] = await Promise.all([
      fetch("data/i18n.json"),
      fetch("data/projects.json")
    ]);
    state.i18n = await i18nRes.json();
    state.projects = await projRes.json();
  }

  function setText(id, txt){ const el = document.getElementById(id); if (el) el.textContent = txt; }
  function setHref(id, href){ const el = document.getElementById(id); if (el) el.href = href || "#"; }

  function render(){
    if (!state.project){
      document.getElementById("title").textContent = "Project not found";
      return;
    }

    // UI translations
    setText("backHome", (state.lang === "ar") ? "← الرئيسية" : (state.lang === "fr" ? "← Accueil" : "← Home"));
    setText("btnDemo", t("project.demo"));
    setText("btnCode", t("project.code"));
    setText("secOverview", t("project.overview"));
    setText("secWhatIDid", t("project.whatIDid"));
    setText("secResults", t("project.results"));
    setText("secTools", t("project.tools"));
    setText("secLinks", t("project.links"));
    setText("linkDemo", t("project.openDemo"));
    setText("linkCode", t("project.openCode"));
    setText("note", t("project.note"));

    const p = state.project;
    const title = p.title[state.lang] || p.title.en;

    document.title = title + " — Portfolio";
    setText("title", title);

    setText("meta", `${p.year} • ${(p.tags || []).join(" · ")}`);

    setText("overview", (p.overview[state.lang] || p.overview.en || ""));

    // Lists
    const what = document.getElementById("whatIDid");
    what.innerHTML = "";
    (p.whatIDid[state.lang] || p.whatIDid.en || []).forEach(item => {
      const li = document.createElement("li"); li.textContent = item; what.appendChild(li);
    });

    const res = document.getElementById("results");
    res.innerHTML = "";
    (p.results[state.lang] || p.results.en || []).forEach(item => {
      const li = document.createElement("li"); li.textContent = item; res.appendChild(li);
    });

    // Tools badges
    const tools = document.getElementById("tools");
    tools.innerHTML = "";
    (p.tools || []).forEach(tool => {
      const span = document.createElement("span");
      span.className = "badge text-bg-light border";
      span.textContent = tool;
      tools.appendChild(span);
    });

    // Links
    setHref("btnDemo", p.demoUrl);
    setHref("btnCode", p.codeUrl);
    setHref("linkDemo", p.demoUrl);
    setHref("linkCode", p.codeUrl);

    // Home link keeps language
    document.getElementById("backHome").href = `index.html?lang=${encodeURIComponent(state.lang)}`;
  }

  async function init(){
    applyDirAndLang(state.lang);
    document.getElementById("langSelect").value = state.lang;

    await loadData();
    state.project = state.projects.find(x => x.id === state.id);

    render();

    document.getElementById("langSelect").addEventListener("change", (e) => {
      state.lang = e.target.value;
      localStorage.setItem("lang", state.lang);
      applyDirAndLang(state.lang);
      // reload same project with new lang param:
      const url = new URL(location.href);
      url.searchParams.set("lang", state.lang);
      history.replaceState({}, "", url);
      render();
    });
  }

  init();
</script>
</body>
</html>
